<!doctype html>
<html lang="en" data-root="..">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SMAJ STORE | Settings</title>
  <link rel="stylesheet" href="../assets/css/base.css" />
  <link rel="stylesheet" href="../assets/css/layout.css" />
  <link rel="stylesheet" href="../assets/css/components.css" />
  <link rel="stylesheet" href="../assets/css/pages.css" />
  <link rel="stylesheet" href="../assets/css/responsive.css" />
</head>
<body data-page="dashboardSettings" data-requires-auth="true" data-allowed-roles="buyer,vendor,admin">
  <div data-include="../components/header.html"></div>
  
  <main class="page container">
    <section class="hero home-hero">
      <p class="eyebrow">Settings</p>
      <h1 class="display">Account Settings</h1>
      <p class="lead">Manage your preferences and account settings.</p>
    </section>

    <section class="home-section top-tight">
      <div class="card">
        <h3>Preferences</h3>
        <form id="settingsForm" class="stack-form">
          <label>
            Notification Email
            <input type="email" name="email" placeholder="your@email.com" />
          </label>
          <label>
            Display Name
            <input type="text" name="displayName" placeholder="Your Display Name" />
          </label>
          <label>
            <input type="checkbox" name="notifications" checked /> Enable order notifications
          </label>
          <button type="submit" class="btn btn-primary">Save Settings</button>
        </form>
        <p class="hint" id="settingsState"></p>
      </div>
    </section>
  </main>
  
  <div data-include="../components/footer.html"></div>
  
  <script src="../assets/js/auth-client.js"></script>
  <script src="../assets/js/store.js"></script>
  <script src="../assets/js/router-guard.js"></script>
  <script src="../assets/js/ui-components.js"></script>
  <script src="../assets/js/vendor-flow.js"></script>
  <script src="../assets/js/admin-ui.js"></script>
  <script src="../assets/js/dashboard-page.js"></script>
  <script src="../assets/js/app.js"></script>
</body>
</html>
