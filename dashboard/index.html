<!doctype html>
<html lang="en" data-root="..">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SMAJ STORE | Dashboard</title>
  <link rel="stylesheet" href="../assets/css/base.css" />
  <link rel="stylesheet" href="../assets/css/layout.css" />
  <link rel="stylesheet" href="../assets/css/components.css" />
  <link rel="stylesheet" href="../assets/css/pages.css" />
  <link rel="stylesheet" href="../assets/css/responsive.css" />
</head>
<body data-page="dashboard" data-requires-auth="true" data-allowed-roles="buyer,vendor,admin">
  <div data-include="../components/header.html"></div>
  
  <main class="page container">
    <section class="hero home-hero">
      <p class="eyebrow">Dashboard</p>
      <h1 class="display">Welcome to Your Dashboard</h1>
      <p class="lead">Manage your account, orders, and settings.</p>
    </section>

    <section class="home-section top-tight">
      <div class="grid grid-3">
        <a class="card" href="profile.html">
          <h3>Profile</h3>
          <p>View and edit your account details</p>
        </a>
        <a class="card" href="orders.html">
          <h3>Orders</h3>
          <p>View your order history</p>
        </a>
        <a class="card" href="settings.html">
          <h3>Settings</h3>
          <p>Manage your preferences</p>
        </a>
      </div>
    </section>

    <section class="home-section top-tight" id="dashboardContent">
      <!-- Dynamic content loaded based on user role -->
    </section>
  </main>
  
  <div data-include="../components/footer.html"></div>
  
  <script src="../assets/js/auth-client.js"></script>
  <script src="../assets/js/store.js"></script>
  <script src="../assets/js/router-guard.js"></script>
  <script src="../assets/js/ui-components.js"></script>
  <script src="../assets/js/vendor-flow.js"></script>
  <script src="../assets/js/admin-ui.js"></script>
  <script src="../assets/js/dashboard-page.js"></script>
  <script src="../assets/js/app.js"></script>
</body>
</html>
