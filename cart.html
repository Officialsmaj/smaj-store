<!doctype html>
<html lang="en" data-root=".">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SMAJ STORE | Cart</title>
  <link rel="stylesheet" href="assets/css/base.css" />
  <link rel="stylesheet" href="assets/css/layout.css" />
  <link rel="stylesheet" href="assets/css/components.css" />
  <link rel="stylesheet" href="assets/css/pages.css" />
  <link rel="stylesheet" href="assets/css/responsive.css" />
</head>
<body data-page="cart" data-requires-auth="true" data-allowed-roles="buyer,vendor,admin">
  <div data-include="components/header.html"></div>
  
  <main class="page container">
    <section class="hero home-hero">
      <p class="eyebrow">Cart</p>
      <h1 class="display">Manage Cart</h1>
      <p class="lead">Update quantity, remove items, and continue to checkout.</p>
    </section>

    <section class="home-section top-tight">
      <div class="card table-wrap">
        <table class="data-table">
          <thead>
            <tr>
              <th>Product</th>
              <th>Unit Price (USD/Pi)</th>
              <th>Quantity</th>
              <th>Line Total (USD)</th>
              <th>Line Total (Pi)</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="cartTableBody"></tbody>
        </table>
        <p class="cart-total" id="cartTotals">Total: $0.00 (0 Pi)</p>
        <div class="button-row">
          <a class="btn btn-outline" href="marketplace.html">Continue Shopping</a>
          <button type="button" class="btn btn-primary" id="checkoutBtn">Proceed to Checkout</button>
        </div>
      </div>
    </section>
  </main>
  
  <div data-include="components/footer.html"></div>
  
  <script src="assets/js/auth-client.js"></script>
  <script src="assets/js/store.js"></script>
  <script src="assets/js/router-guard.js"></script>
  <script src="assets/js/ui-components.js"></script>
  <script src="assets/js/vendor-flow.js"></script>
  <script src="assets/js/admin-ui.js"></script>
  <script src="assets/js/cart-page.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
