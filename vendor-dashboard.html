<!doctype html>
<html lang="en" data-root=".">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SMAJ STORE | Vendor Dashboard</title>
  <link rel="stylesheet" href="assets/css/base.css" />
  <link rel="stylesheet" href="assets/css/layout.css" />
  <link rel="stylesheet" href="assets/css/components.css" />
  <link rel="stylesheet" href="assets/css/pages.css" />
  <link rel="stylesheet" href="assets/css/responsive.css" />
</head>
<body data-page="vendorDashboard" data-requires-auth="true" data-allowed-roles="vendor,admin">
  <div data-include="components/header.html"></div>
  
  <main class="page container">
    <section class="hero home-hero">
      <p class="eyebrow">Vendor Role</p>
      <h1 class="display">Vendor Dashboard</h1>
      <p class="lead">Add products, manage listings, process orders, and track Pi earnings.</p>
    </section>

    <section class="home-section top-tight">
      <div class="grid grid-2">
        <div class="card" id="vendor-profile">
          <h3>Add Product</h3>
          <form id="vendorProductForm" class="stack-form">
            <label>Name <input name="name" required /></label>
            <label>Description <textarea name="description" rows="3" required></textarea></label>
            <label>Category <input name="category" placeholder="electronics/services" /></label>
            <label>Price (Pi) <input name="price_pi" type="number" step="0.00000001" min="0" required /></label>
            <label>Stock <input name="stock" type="number" min="0" required /></label>
            <label>Image URL <input name="image" type="url" /></label>
            <label>Status
              <select name="status">
                <option value="active">active</option>
                <option value="inactive">inactive</option>
              </select>
            </label>
            <button type="submit" class="btn btn-primary">Upload Product</button>
          </form>
        </div>

        <div class="card">
          <h3>Manage Products</h3>
          <div id="vendorProducts"></div>
        </div>

        <div class="card" id="vendor-orders">
          <h3>Orders</h3>
          <div id="vendorOrders"></div>
        </div>

        <div class="card">
          <h3>Earnings</h3>
          <div id="vendorEarnings"></div>
        </div>

        <div class="card" data-admin-section>
          <h3>Admin Vendor Approvals</h3>
          <div id="adminApprovals"></div>
        </div>
      </div>
    </section>
  </main>
  
  <div data-include="components/footer.html"></div>
  
  <script src="assets/js/auth-client.js"></script>
  <script src="assets/js/store.js"></script>
  <script src="assets/js/router-guard.js"></script>
  <script src="assets/js/ui-components.js"></script>
  <script src="assets/js/vendor-flow.js"></script>
  <script src="assets/js/admin-ui.js"></script>
  <script src="assets/js/dashboard-page.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
