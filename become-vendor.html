<!doctype html>
<html lang="en" data-root=".">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SMAJ STORE | Become a Vendor</title>
  <link rel="stylesheet" href="assets/css/base.css" />
  <link rel="stylesheet" href="assets/css/layout.css" />
  <link rel="stylesheet" href="assets/css/components.css" />
  <link rel="stylesheet" href="assets/css/pages.css" />
  <link rel="stylesheet" href="assets/css/responsive.css" />
</head>
<body data-requires-auth="true" data-allowed-roles="buyer,vendor,admin">
  <div data-include="components/header.html"></div>
  <main class="page container">
    <h1>Vendor Application</h1>
    <p class="lead">Centralized auth check is required before accessing this form.</p>
    <form class="card form" id="vendorApplicationForm">
      <label>Full Name<input name="full_name" type="text" required /></label>
      <label>Business Name<input name="business_name" type="text" required /></label>
      <label>Country<input name="country" type="text" required /></label>
      <label>Phone<input name="phone" type="tel" required /></label>
      <label>Email<input name="email" type="email" required /></label>
      <label>Government ID Upload<input name="government_id" type="file" accept=".pdf,.jpg,.jpeg,.png" required /></label>
      <label>Business Description<textarea name="business_description" rows="4" required></textarea></label>
      <label class="check"><input name="agreement" type="checkbox" required /> I agree to SMAJ STORE vendor policies.</label>
      <button class="btn btn-primary" type="submit">Submit Application</button>
      <p class="hint" data-vendor-submit-state></p>
    </form>
  </main>
  <div data-include="components/footer.html"></div>
  <script src="assets/js/auth-client.js"></script>
  <script src="assets/js/router-guard.js"></script>
  <script src="assets/js/vendor-flow.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
