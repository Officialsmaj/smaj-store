<!doctype html>
<html lang="en" data-root=".">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SMAJ STORE | Marketplace</title>
  <link rel="stylesheet" href="assets/css/base.css" />
  <link rel="stylesheet" href="assets/css/layout.css" />
  <link rel="stylesheet" href="assets/css/components.css" />
  <link rel="stylesheet" href="assets/css/pages.css" />
  <link rel="stylesheet" href="assets/css/responsive.css" />
</head>
<body data-page="marketplace">
  <div data-include="components/header.html"></div>
  
  <main class="page container">
    <section class="hero home-hero">
      <p class="eyebrow">Marketplace</p>
      <h1 class="display">Browse products priced in Pi.</h1>
      <p class="lead">Product cards include Pi primary pricing and USD reference.</p>
    </section>

    <section class="home-section top-tight">
      <div class="card">
        <div class="filters">
          <label>
            Search
            <input id="productSearch" type="search" placeholder="Search by title, category, or vendor" />
          </label>
          <label>
            Category
            <select id="categoryFilter">
              <option value="all">All</option>
              <option value="electronics">Electronics</option>
              <option value="computers">Computers</option>
              <option value="services">Services</option>
              <option value="general">General</option>
            </select>
          </label>
        </div>
      </div>
    </section>

    <section class="home-section top-tight">
      <div class="grid grid-3" id="productsGrid"></div>
    </section>
  </main>
  
  <div data-include="components/footer.html"></div>
  
  <script src="assets/js/auth-client.js"></script>
  <script src="assets/js/store.js"></script>
  <script src="assets/js/router-guard.js"></script>
  <script src="assets/js/ui-components.js"></script>
  <script src="assets/js/vendor-flow.js"></script>
  <script src="assets/js/admin-ui.js"></script>
  <script src="assets/js/marketplace-page.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
